# ============================================
# KOMUNITIP - Docker Compose (Development)
# ============================================
# Usage:
#   docker compose up --build -d    → Start all services
#   docker compose down             → Stop all services
#   docker compose logs -f          → View logs
# ============================================

name: komunitip  

services:
  # ─────────────────────────────────────────
  # 1. DATABASE
  # ─────────────────────────────────────────
  postgres-db:
    image: postgres:15-alpine
    container_name: komunitip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - komunitip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. AI MODERATION (FastAPI + ONNX)
  # ─────────────────────────────────────────
  ai-risk-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: komunitip-ai-risk-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=/app/risk-engine
      - API_KEY=${AI_MODERATION_API_KEY}
    networks:
      - komunitip-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 3. BACKEND API (NestJS)
  # ─────────────────────────────────────────
  backend-api:
    build:
      context: ./backend
      target: development
    command: npm run start:dev:docker
    container_name: komunitip-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres-db:
        condition: service_healthy
      ai-risk-engine:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres-db:5432/${DB_NAME}?schema=public
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - AI_MODERATION_URL=http://ai-risk-engine:8000
      - AI_MODERATION_API_KEY=${AI_MODERATION_API_KEY}
      - AI_MODERATION_TIMEOUT_MS=${AI_MODERATION_TIMEOUT_MS:-2000}
      - XENDIT_SECRET_KEY=${XENDIT_SECRET_KEY}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN}
      - XENDIT_PAYOUT_WEBHOOK_TOKEN=${XENDIT_PAYOUT_WEBHOOK_TOKEN}
      - XENDIT_AUTO_DISBURSE=${XENDIT_AUTO_DISBURSE:-false}
    networks:
      - komunitip-network

  # ─────────────────────────────────────────
  # 4. FRONTEND (Vue 3 + Vite)
  # ─────────────────────────────────────────
  frontend-app:
    build:
      context: ./Frontend
      target: development
    container_name: komunitip-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend-api
    volumes:
      - ./Frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:${PORT:-3000}/api
      - VITE_API_PROXY_TARGET=http://backend-api:3000
    networks:
      - komunitip-network

  # ─────────────────────────────────────────
  # 5. ADMINER (Database GUI)
  # ─────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: komunitip-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - komunitip-network

volumes:
  postgres-data:

networks:
  komunitip-network:
    driver: bridge
