version: 2

# Dependabot: otomatis buat PR untuk update dependency yang usang / rentan.
updates:
  # Backend (npm)
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(backend)"

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /Frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(frontend)"

  # Risk engine (pip)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(risk-engine)"

  # GitHub Actions itu sendiri
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
